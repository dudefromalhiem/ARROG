<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Red Oaker Guild</title>
  <meta name="description" content="Manage your Red Oaker Guild profile." />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .profile-shell { max-width: 840px; margin: 0 auto; }
    .profile-grid { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
    .profile-card { border:1px solid var(--blk-m); background:var(--blk-b); padding:14px; }
    .profile-avatar { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border:2px solid var(--red-d); background:#111; display:block; margin: 8px auto; }
    .profile-warning { border:1px solid var(--red-g); background: rgba(139,0,0,.12); color: var(--wht); font-weight: 700; padding: 10px 12px; margin-bottom: 12px; }
    .profile-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .profile-status { font-size:.8rem; color:var(--wht-f); margin-top:8px; }
    .profile-view-actions { margin-top: 12px; display:flex; gap:8px; flex-wrap:wrap; }
    .profile-view-actions.hidden { display:none; }
    .profile-readonly { opacity:.85; }
    @media (max-width: 880px) { .profile-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header class="hdr">
  <div class="hdr-in">
    <a href="index.html" class="hdr-brand">
      <img src="logo.png" alt="Red Oaker Guild" class="hdr-logo" />
      <span class="hdr-title">Red Oaker Guild</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.getElementById('nav').classList.toggle('open')">☰</button>
    <ul class="nav" id="nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="guide.html">Guide</a></li>
      <li><a href="explore.html">Explore</a></li>
      <li id="messaging-link" class="hidden"><a href="messaging.html">Messages</a></li>
      <li id="submit-link" class="hidden"><a href="submit.html">Workstation</a></li>
      <li id="nav-auth"><button class="nav-btn" onclick="location.href='index.html'">Sign In</button></li>
    </ul>
  </div>
</header>

<main class="wrap profile-shell" id="main-content">
  <div class="section">
    <div class="section-hd">Profile</div>
    <div class="profile-warning" id="profile-warning">Any user with inappropriate profile images will be banned.</div>

    <div class="profile-grid">
      <div class="profile-card">
        <div class="card-t">Profile Picture</div>
        <img id="profile-avatar" class="profile-avatar" src="logo.png" alt="Profile picture" loading="lazy" decoding="async" />
        <div class="fg" id="profile-upload-group">
          <label class="fl" for="profile-picture">Upload picture</label>
          <input class="fi" id="profile-picture" type="file" accept="image/*" />
        </div>
        <div class="profile-actions" id="profile-upload-actions">
          <button class="btn btn-p" id="profile-upload-btn" type="button">Upload</button>
        </div>
      </div>

      <div class="profile-card">
        <div class="card-t">Identity</div>
        <div class="fg">
          <label class="fl" for="profile-username">Username</label>
          <input class="fi" id="profile-username" maxlength="80" placeholder="Enter a username" />
        </div>
        <div class="fg">
          <label class="fl" for="profile-bio">Bio</label>
          <textarea class="fta" id="profile-bio" maxlength="500" placeholder="Write a short bio"></textarea>
        </div>
        <div class="profile-actions">
          <button class="btn btn-p" id="profile-save-btn" type="button">Save Profile</button>
          <a class="btn btn-s" href="index.html">Back Home</a>
        </div>
        <div class="profile-view-actions hidden" id="profile-view-actions">
          <button class="btn btn-p" id="profile-add-friend-btn" type="button">Add Friend</button>
          <button class="btn btn-s" id="profile-message-btn" type="button">Message</button>
          <button class="btn btn-s" id="profile-report-btn" type="button">Report</button>
          <button class="btn btn-d" id="profile-block-btn" type="button">Block</button>
        </div>
        <div class="profile-status" id="profile-status">Sign in to update your profile.</div>
      </div>
    </div>
  </div>
</main>

<footer class="ftr">
  <div class="ftr-in">
    <p class="ftr-copy">&copy; 2026 Red Oaker Guild</p>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
let socialApiBase = '/api/social';
let currentProfileUid = '';
let viewedProfileData = null;

function configureSocialApiBase() {
  const host = String(window.location.hostname || '').toLowerCase();
  const isLocal = host === 'localhost' || host === '127.0.0.1';
  const isFile = window.location.protocol === 'file:';
  socialApiBase = (isLocal || isFile) ? 'https://redoakguild.vercel.app/api/social' : '/api/social';
}

function setProfileStatus(message, isError) {
  const el = document.getElementById('profile-status');
  if (!el) return;
  el.textContent = message;
  el.style.color = isError ? 'var(--red-g)' : 'var(--wht-f)';
}

function safeProfileText(value, max) {
  return String(value || '').replace(/\s+/g, ' ').trim().slice(0, max);
}

function bytesFromDataUrl(dataUrl) {
  const parts = String(dataUrl || '').split(',');
  if (parts.length < 2) return 0;
  const base64 = parts[1];
  const padding = (base64.match(/=+$/) || [''])[0].length;
  return Math.floor((base64.length * 3) / 4) - padding;
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Could not decode image.'));
    img.src = url;
  });
}

async function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(reader.error || new Error('Could not read file.'));
    reader.readAsDataURL(file);
  });
}

async function optimizeProfileImage(file) {
  const original = await fileToDataUrl(file);
  const image = await loadImage(original);

  let width = image.naturalWidth || image.width;
  let height = image.naturalHeight || image.height;
  const scale = Math.min(1, 512 / Math.max(width, height));
  width = Math.max(1, Math.floor(width * scale));
  height = Math.max(1, Math.floor(height * scale));

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  if (!ctx) throw new Error('Could not initialize image pipeline.');

  ctx.drawImage(image, 0, 0, width, height);
  let quality = 0.84;
  let dataUrl = canvas.toDataURL('image/jpeg', quality);

  while (bytesFromDataUrl(dataUrl) > 230 * 1024 && quality > 0.48) {
    quality -= 0.08;
    dataUrl = canvas.toDataURL('image/jpeg', quality);
  }

  if (bytesFromDataUrl(dataUrl) > 230 * 1024) {
    throw new Error('Image is too large after optimization. Use a smaller image.');
  }

  return dataUrl;
}

async function loadProfile(user) {
  const username = document.getElementById('profile-username');
  const bio = document.getElementById('profile-bio');
  const avatar = document.getElementById('profile-avatar');
  if (!username || !bio || !avatar) return;

  try {
    const doc = await db.collection('users').doc(user.uid).get();
    const data = doc.exists ? (doc.data() || {}) : {};
    username.value = data.displayName || user.displayName || '';
    bio.value = data.bio || '';
    avatar.src = data.photoURL || user.photoURL || 'logo.png';
    setProfileStatus('Profile loaded.', false);
  } catch (err) {
    setProfileStatus('Could not load profile: ' + err.message, true);
  }
}

async function loadPublicProfile(uid) {
  const targetUid = String(uid || '').trim();
  if (!targetUid) throw new Error('Missing profile target.');
  const base = new URL(socialApiBase, window.location.origin);
  base.searchParams.set('type', 'profile');
  base.searchParams.set('uid', targetUid);
  const response = await fetch(base.toString(), { method: 'GET' });
  const payload = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(payload.error || 'Could not load profile.');
  return payload.profile || null;
}

function applyProfileMode(isEditable, viewerSignedIn) {
  const username = document.getElementById('profile-username');
  const bio = document.getElementById('profile-bio');
  const saveBtn = document.getElementById('profile-save-btn');
  const uploadGroup = document.getElementById('profile-upload-group');
  const uploadActions = document.getElementById('profile-upload-actions');
  const viewActions = document.getElementById('profile-view-actions');
  const warning = document.getElementById('profile-warning');

  if (username) {
    username.readOnly = !isEditable;
    username.classList.toggle('profile-readonly', !isEditable);
  }
  if (bio) {
    bio.readOnly = !isEditable;
    bio.classList.toggle('profile-readonly', !isEditable);
  }
  if (saveBtn) saveBtn.style.display = isEditable ? 'inline-block' : 'none';
  if (uploadGroup) uploadGroup.style.display = isEditable ? 'block' : 'none';
  if (uploadActions) uploadActions.style.display = isEditable ? 'flex' : 'none';
  if (viewActions) {
    viewActions.classList.toggle('hidden', isEditable);
    Array.from(viewActions.querySelectorAll('button')).forEach(btn => {
      btn.disabled = !viewerSignedIn;
    });
  }
  if (warning) {
    warning.textContent = isEditable
      ? 'Any user with inappropriate profile images will be banned.'
      : 'Viewing public profile. Sign in to use profile actions.';
  }
}

function openMessageToViewedProfile() {
  if (!viewedProfileData || !viewedProfileData.uid) return;
  localStorage.setItem('dmRecipientUid', viewedProfileData.uid);
  localStorage.setItem('dmRecipientName', viewedProfileData.displayName || 'Guild Member');
  location.href = 'messaging.html?to=' + encodeURIComponent(viewedProfileData.uid);
}

async function postProfileAction(action, extraPayload) {
  const user = auth.currentUser;
  if (!user) throw new Error('Sign in required.');
  const token = await user.getIdToken();
  const response = await fetch(socialApiBase, {
    method: 'POST',
    headers: {
      Authorization: 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(Object.assign({ action: action, targetUid: viewedProfileData?.uid || '' }, extraPayload || {}))
  });
  const payload = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(payload.error || 'Action failed.');
  return payload;
}

async function addFriendFromProfile() {
  try {
    setProfileStatus('Sending friend request...', false);
    const result = await postProfileAction('addfriend', {});
    if (result && result.alreadyPending) {
      setProfileStatus('Friend request already pending.', false);
    } else {
      setProfileStatus('Friend request sent.', false);
    }
  } catch (err) {
    setProfileStatus('Add friend failed: ' + err.message, true);
  }
}

async function reportFromProfile() {
  const reason = prompt('Reason for reporting this user:', '');
  if (reason === null) return;
  const trimmed = String(reason || '').trim();
  if (!trimmed) {
    setProfileStatus('Report cancelled.', false);
    return;
  }
  try {
    setProfileStatus('Submitting report...', false);
    await postProfileAction('report', { reason: trimmed });
    setProfileStatus('Report submitted.', false);
  } catch (err) {
    setProfileStatus('Report failed: ' + err.message, true);
  }
}

async function blockFromProfile() {
  const reason = prompt('Reason for blocking this user (optional):', '');
  if (reason === null) return;
  try {
    setProfileStatus('Blocking user...', false);
    await postProfileAction('block', { reason: String(reason || '').trim() });
    setProfileStatus('User blocked.', false);
  } catch (err) {
    setProfileStatus('Block failed: ' + err.message, true);
  }
}

async function saveProfile() {
  const user = auth.currentUser;
  if (!user) {
    setProfileStatus('Please sign in first.', true);
    return;
  }

  const username = safeProfileText(document.getElementById('profile-username')?.value || '', 80);
  const bio = safeProfileText(document.getElementById('profile-bio')?.value || '', 500);
  if (!username) {
    setProfileStatus('Username cannot be empty.', true);
    return;
  }

  try {
    setProfileStatus('Saving profile...', false);
    await user.updateProfile({ displayName: username });
    await db.collection('users').doc(user.uid).set({
      uid: user.uid,
      email: user.email || '',
      displayName: username,
      bio: bio,
      updatedAt: new Date().toISOString(),
      lastLogin: new Date().toISOString()
    }, { merge: true });
    setProfileStatus('Profile saved.', false);
  } catch (err) {
    setProfileStatus('Save failed: ' + err.message, true);
  }
}

async function uploadProfilePicture() {
  const user = auth.currentUser;
  if (!user) {
    setProfileStatus('Please sign in first.', true);
    return;
  }

  const picker = document.getElementById('profile-picture');
  const file = picker && picker.files && picker.files[0] ? picker.files[0] : null;
  if (!file) {
    setProfileStatus('Select an image first.', true);
    return;
  }

  try {
    setProfileStatus('Uploading profile picture...', false);
    const optimized = await optimizeProfileImage(file);
    let photoURL = optimized;
    let storageUploadFailed = false;
    let storageUploadErrorMessage = '';

    if (storage && typeof storage.ref === 'function') {
      const path = 'uploads/' + user.uid + '/profile/avatar.jpg';
      const ref = storage.ref(path);
      try {
        await ref.putString(optimized, 'data_url', { contentType: 'image/jpeg' });
        photoURL = await ref.getDownloadURL();
      } catch (storageErr) {
        // Keep a working profile update path even when Storage rules/env are misconfigured.
        storageUploadFailed = true;
        storageUploadErrorMessage = storageErr && storageErr.message ? storageErr.message : 'Storage upload failed.';
        photoURL = optimized;
      }
    }

    await user.updateProfile({ photoURL: photoURL });
    await db.collection('users').doc(user.uid).set({
      photoURL: photoURL,
      updatedAt: new Date().toISOString()
    }, { merge: true });

    const avatar = document.getElementById('profile-avatar');
    if (avatar) avatar.src = photoURL;
    if (storageUploadFailed) {
      setProfileStatus('Profile picture updated, but cloud upload was denied. Using local optimized image. (' + storageUploadErrorMessage + ')', true);
    } else {
      setProfileStatus('Profile picture updated.', false);
    }
  } catch (err) {
    setProfileStatus('Upload failed: ' + err.message, true);
  }
}

auth.onAuthStateChanged(async user => {
  const navAuth = document.getElementById('nav-auth');
  const messagingLink = document.getElementById('messaging-link');
  const submitLink = document.getElementById('submit-link');
  const nav = document.getElementById('nav');
  let adminLink = nav ? nav.querySelector('#admin-link') : null;
  const queryUid = String(new URLSearchParams(window.location.search).get('uid') || '').trim();
  const viewingOther = !!queryUid && (!user || queryUid !== user.uid);
  currentProfileUid = queryUid || (user ? user.uid : '');

  if (!user) {
    navAuth.innerHTML = '<button class="nav-btn" onclick="location.href=\'index.html\'">Sign In</button>';
    if (messagingLink) messagingLink.classList.add('hidden');
    if (submitLink) submitLink.classList.add('hidden');
    if (adminLink) adminLink.remove();
    if (!viewingOther) {
      applyProfileMode(false, false);
      setProfileStatus('Please sign in to edit your profile.', true);
      return;
    }
    try {
      viewedProfileData = await loadPublicProfile(queryUid);
      document.getElementById('profile-username').value = viewedProfileData.displayName || '';
      document.getElementById('profile-bio').value = viewedProfileData.bio || '';
      document.getElementById('profile-avatar').src = viewedProfileData.photoURL || 'logo.png';
      applyProfileMode(false, false);
      setProfileStatus('Viewing profile of ' + (viewedProfileData.displayName || 'Agent') + '.', false);
    } catch (err) {
      setProfileStatus('Could not load profile: ' + err.message, true);
    }
    return;
  }

  navAuth.innerHTML = renderUserMenuHTML(user.displayName || 'Agent');
  if (messagingLink) messagingLink.classList.remove('hidden');
  if (submitLink) submitLink.classList.remove('hidden');
  if (nav) {
    if (isAdmin(user.email)) {
      if (!adminLink) {
        adminLink = document.createElement('li');
        adminLink.id = 'admin-link';
        adminLink.innerHTML = '<a href="admin.html">Admin</a>';
        const authLi = nav.querySelector('#nav-auth');
        nav.insertBefore(adminLink, authLi || null);
      }
    } else if (adminLink) {
      adminLink.remove();
    }
  }
  if (viewingOther) {
    try {
      viewedProfileData = await loadPublicProfile(queryUid);
      document.getElementById('profile-username').value = viewedProfileData.displayName || '';
      document.getElementById('profile-bio').value = viewedProfileData.bio || '';
      document.getElementById('profile-avatar').src = viewedProfileData.photoURL || 'logo.png';
      applyProfileMode(false, true);
      setProfileStatus('Viewing profile of ' + (viewedProfileData.displayName || 'Agent') + '.', false);
    } catch (err) {
      setProfileStatus('Could not load profile: ' + err.message, true);
    }
  } else {
    applyProfileMode(true, true);
    await loadProfile(user);
  }
});

configureSocialApiBase();
document.getElementById('profile-save-btn')?.addEventListener('click', saveProfile);
document.getElementById('profile-upload-btn')?.addEventListener('click', uploadProfilePicture);
document.getElementById('profile-message-btn')?.addEventListener('click', openMessageToViewedProfile);
document.getElementById('profile-add-friend-btn')?.addEventListener('click', addFriendFromProfile);
document.getElementById('profile-report-btn')?.addEventListener('click', reportFromProfile);
document.getElementById('profile-block-btn')?.addEventListener('click', blockFromProfile);
</script>
</body>
</html>
