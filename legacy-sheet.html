<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legacy Sheet - Red Oaker Guild</title>
  <meta name="description" content="Guild legacy registry with chapter files, hover previews, and workshop-linked entries." />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .legacy-wrap { max-width: 1120px; margin: 34px auto; }
    .legacy-meta {
      border: 2px solid var(--red-d);
      background: linear-gradient(135deg, rgba(139, 0, 0, 0.1), rgba(0, 0, 0, 0.45));
      padding: 12px 14px;
      color: var(--wht-d);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .legacy-sheet {
      border: 2px solid var(--red-d);
      background: linear-gradient(180deg, rgba(35, 0, 0, 0.22), rgba(0, 0, 0, 0.55));
      padding: 24px;
      margin-bottom: 18px;
    }
    .legacy-title {
      font-size: clamp(2rem, 4.4vw, 3.2rem);
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .legacy-subtitle {
      color: var(--wht-d);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.82rem;
      margin-bottom: 14px;
    }
    .legacy-description {
      color: var(--wht-m);
      font-size: 0.93rem;
      line-height: 1.75;
      border-top: 1px solid rgba(204, 0, 0, 0.35);
      padding-top: 12px;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }
    .legacy-core {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
    }
    .legacy-core-item {
      border-left: 3px solid var(--red-d);
      padding-left: 12px;
    }
    .legacy-core-item h3 {
      border: none;
      margin: 0 0 6px;
      color: var(--red-b);
      letter-spacing: 1px;
      font-size: 0.95rem;
      text-transform: uppercase;
    }
    .legacy-core-item p {
      margin: 0;
      color: var(--wht-m);
      line-height: 1.7;
      white-space: pre-wrap;
      font-size: 0.87rem;
    }
    .legacy-auth-note {
      border: 2px solid var(--red-b);
      background: linear-gradient(135deg, rgba(204, 0, 0, 0.26), rgba(0, 0, 0, 0.62));
      color: var(--wht);
      padding: 12px 14px;
      margin: 0 0 22px;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.55;
      font-size: 0.78rem;
      box-shadow: 0 0 0 1px rgba(204, 0, 0, 0.35) inset;
    }
    .chapter {
      border: 1px solid var(--red-d);
      background: rgba(0, 0, 0, 0.34);
      margin-top: 18px;
    }
    .chapter-head {
      border-bottom: 1px solid var(--red-d);
      background: linear-gradient(90deg, rgba(139, 0, 0, 0.26), rgba(0, 0, 0, 0.15));
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .chapter-title {
      font-size: 1.05rem;
      letter-spacing: 1px;
      color: var(--wht);
      text-transform: uppercase;
      margin: 0;
    }
    .chapter-meta {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      font-size: 0.66rem;
      text-transform: uppercase;
      color: var(--wht-f);
      letter-spacing: 1px;
    }
    .chapter-chip {
      border: 1px solid var(--red-d);
      background: rgba(0, 0, 0, 0.34);
      padding: 3px 7px;
    }
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0;
      border-top: 1px solid var(--red-d);
      border-left: 1px solid var(--red-d);
    }
    .file-card {
      position: relative;
      min-height: 192px;
      background: #050505;
      border-right: 1px solid var(--red-d);
      border-bottom: 1px solid var(--red-d);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .file-card:hover,
    .file-card:focus-visible {
      outline: none;
      box-shadow: inset 0 0 0 2px var(--red-b);
    }
    .file-front {
      position: relative;
      z-index: 2;
      height: 100%;
      padding: 12px;
      display: grid;
      gap: 8px;
      align-content: start;
      transition: opacity 0.16s ease;
    }
    .file-card:hover .file-front,
    .file-card:focus-visible .file-front {
      opacity: 0.1;
    }
    .file-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }
    .file-designation {
      color: var(--red-b);
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.4;
      font-weight: 700;
    }
    .file-clearance {
      border: 1px solid var(--red-d);
      background: rgba(139, 0, 0, 0.2);
      color: var(--red-b);
      font-size: 0.62rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 6px;
      white-space: nowrap;
    }
    .file-label {
      color: var(--wht-m);
      font-size: 0.8rem;
      line-height: 1.45;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .file-notes {
      color: var(--wht-f);
      font-size: 0.72rem;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-link-note {
      margin-top: auto;
      color: var(--wht-d);
      font-size: 0.62rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid var(--red-d);
      padding: 4px 7px;
      width: fit-content;
      background: rgba(0, 0, 0, 0.35);
    }
    .file-hover {
      position: absolute;
      inset: 0;
      opacity: 0;
      z-index: 3;
      transition: opacity 0.16s ease;
      background: #000;
    }
    .file-card:hover .file-hover,
    .file-card:focus-visible .file-hover {
      opacity: 1;
    }
    .file-hover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1);
      transition: transform 0.2s ease;
    }
    .file-card:hover .file-hover img,
    .file-card:focus-visible .file-hover img {
      transform: scale(1.03);
    }
    .file-hover-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.52);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--wht-m);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.45;
      padding: 10px;
    }
    .legacy-editor {
      border: 2px solid var(--red-d);
      background: rgba(0, 0, 0, 0.35);
      padding: 16px;
      display: none;
      margin-top: 14px;
    }
    .legacy-editor.open { display: block; }
    .legacy-editor .fg { margin-bottom: 12px; }
    .legacy-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .legacy-owner-actions { display: none; margin-top: 12px; }
    .legacy-doc-card {
      border: 1px solid var(--red-d);
      background: rgba(0, 0, 0, 0.28);
      padding: 10px;
      margin-bottom: 12px;
    }
    .legacy-doc-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .legacy-doc-label {
      color: var(--red-b);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.78rem;
    }
    .legacy-doc-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .legacy-doc-grid .fg { margin-bottom: 0; }
    .legacy-empty {
      border: 1px dashed var(--red-d);
      color: var(--wht-f);
      font-size: 0.76rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 12px;
    }
    .legacy-search-controls {
      border: 1px solid var(--red-d);
      background: rgba(0, 0, 0, 0.28);
      padding: 12px;
      margin-bottom: 14px;
    }
    .legacy-search-controls .fi {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--red-d);
      color: var(--wht);
      padding: 8px 10px;
      font-size: 0.87rem;
    }
    .legacy-search-controls .fi::placeholder {
      color: var(--wht-f);
    }
    @media (max-width: 768px) {
      .legacy-wrap { margin: 20px auto; padding: 0 10px; }
      .legacy-sheet { padding: 16px; }
      .legacy-title { font-size: 1.8rem; }
      .legacy-doc-grid { grid-template-columns: 1fr; }
      .file-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .file-card { min-height: 170px; }
    }
  </style>
</head>
<body>
<header class="hdr">
  <div class="hdr-in">
    <a href="index.html" class="hdr-brand">
      <img src="logo.png" alt="Red Oaker Guild" class="hdr-logo" />
      <span class="hdr-title">Red Oaker Guild</span>
    </a>
    <button class="nav-toggle" onclick="document.getElementById('nav').classList.toggle('open')">☰</button>
    <ul class="nav" id="nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="explore.html">Explore</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li id="submit-link" class="hidden"><a href="submit.html">Workshop</a></li>
      <li id="admin-link" class="hidden"><a href="admin.html">Admin</a></li>
      <li id="nav-auth"><button class="nav-btn" onclick="location.href='index.html'">Sign In</button></li>
    </ul>
  </div>
</header>

<main class="wrap legacy-wrap">
  <div class="section-hd" style="border-bottom:none">Guild Legacy</div>

  <div class="legacy-meta">
    <span>Document: Guild Legacy Register</span>
    <span id="legacy-status">Loading archival sheet...</span>
  </div>

  <div class="legacy-search-controls" id="legacy-search-controls" style="display:none">
    <input type="text" id="legacy-search-input" class="fi" placeholder="Search designations, labels, or notes..." style="margin-bottom:10px" onkeyup="filterLegacyEntries()" />
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px">
      <select id="legacy-filter-clearance" class="fi" onchange="filterLegacyEntries()" style="flex:1; min-width:120px">
        <option value="">All Clearance Levels</option>
        <option value="REQUIRED">REQUIRED</option>
        <option value="LEVEL 1">LEVEL 1</option>
        <option value="LEVEL 2">LEVEL 2</option>
        <option value="LEVEL 3">LEVEL 3</option>
        <option value="LEVEL 4">LEVEL 4</option>
        <option value="LEVEL 5">LEVEL 5</option>
        <option value="RESTRICTED">RESTRICTED</option>
      </select>
      <select id="legacy-sort-by" class="fi" onchange="sortLegacyEntries()" style="flex:1; min-width:120px">
        <option value="chapter">Sort by Chapter</option>
        <option value="designation">Sort by Designation</option>
        <option value="clearance">Sort by Clearance</option>
        <option value="label">Sort by Label</option>
      </select>
      <button class="btn btn-sm btn-s" onclick="resetLegacyFilters()">Reset Filters</button>
    </div>
    <div id="legacy-bulk-actions" style="display:none">
      <div style="border-top:1px solid var(--red-d); padding-top:10px; margin-top:10px">
        <label style="color:var(--wht-m); font-size:0.85rem"><input type="checkbox" id="legacy-select-all" onchange="toggleSelectAllEntries(this.checked)" /> Select All Results</label>
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px">
          <button class="btn btn-sm btn-p" onclick="bulkUpdateClearance()">Bulk Update Clearance</button>
          <button class="btn btn-sm btn-d" onclick="bulkDeleteEntries()" style="display:none">Bulk Delete</button>
        </div>
      </div>
    </div>
  </div>

  <article class="legacy-sheet" id="legacy-sheet-view"></article>

  <section class="legacy-editor" id="legacy-editor">
    <div class="section-hd" style="font-size:1rem">Owner Editing</div>

    <div class="fg">
      <label class="fl" for="legacy-title">Sheet Title</label>
      <input class="fi" id="legacy-title" type="text" />
    </div>

    <div class="fg">
      <label class="fl" for="legacy-subtitle">Subtitle</label>
      <input class="fi" id="legacy-subtitle" type="text" />
    </div>

    <div class="fg">
      <label class="fl" for="legacy-description">Description</label>
      <textarea class="fta" id="legacy-description" maxlength="1200" placeholder="Under 200 words recommended"></textarea>
    </div>

    <div class="legacy-doc-grid">
      <div class="fg">
        <label class="fl" for="legacy-foundation">Foundational Era</label>
        <textarea class="fta" id="legacy-foundation"></textarea>
      </div>
      <div class="fg">
        <label class="fl" for="legacy-prior">Prior Owners</label>
        <textarea class="fta" id="legacy-prior"></textarea>
      </div>
    </div>

    <div class="fg">
      <label class="fl" for="legacy-current">Current Owner Mandate</label>
      <textarea class="fta" id="legacy-current"></textarea>
    </div>

    <div style="border-top:1px solid var(--red-d);margin-top:10px;padding-top:12px">
      <div class="section-hd" style="font-size:1rem">Chapters And Files</div>
      <div class="legacy-actions">
        <button class="btn btn-p" type="button" onclick="addChapter()">+ New Chapter</button>
      </div>
      <div id="legacy-chapters-editor"></div>
    </div>

    <div class="legacy-actions">
      <button class="btn btn-p" type="button" onclick="saveLegacySheet()">Save Legacy Sheet</button>
      <button class="btn btn-s" type="button" onclick="toggleLegacyEditor(false)">Cancel</button>
    </div>
  </section>

  <div class="legacy-owner-actions" id="legacy-owner-actions">
    <button class="btn btn-p" type="button" onclick="toggleLegacyEditor(true)">Edit Legacy Sheet</button>
  </div>
</main>

<footer class="ftr">
  <div class="ftr-in">
    <p class="ftr-copy">&copy; 2026 Red Oaker Guild - Legacy Archive</p>
  </div>
</footer>

  const LEGACY_IMAGE_MAX_BYTES = 2 * 1024 * 1024;
  const LEGACY_IMAGE_TYPES = new Set(['image/png', 'image/jpeg', 'image/gif', 'image/webp']);

  function canEditLegacy(email) {
    if (!email) return false;
    return isOwner(email) || adminHasDelegation(email, 'adminCanEditLegacy');

    foundation: 'Prior to becoming a multinational private organization, the Red Oaker Guild was made up of a singular team of scientific researchers, doctors, and priests. Led by one mans vision, they strived to understand and even befriend the anomalous beings and objects they encountered, harboring and consistently observing many of them. Throughout decades, leadership shifted, and many personnel recorded their findings until the Guilds collapse near the late 20th century.',

  const LEGACY_AUTHENTICITY_NOTICE = 'Authenticity Order: Historical documents that contradict the first archived records are considered false and must be treated as invalid. Only aligned primary records are recognized in this folder.';

  let legacyData = { ...LEGACY_DEFAULT };
  let ownerCanEdit = false;
  const legacyStorage = (typeof storage !== 'undefined' && storage)
    ? storage
    : ((firebase && typeof firebase.storage === 'function') ? firebase.storage() : null);
  const authRef = (typeof auth !== 'undefined' && auth && typeof auth.onAuthStateChanged === 'function')
    ? auth
    : (firebase && typeof firebase.auth === 'function' ? firebase.auth() : null);

  function esc(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttr(value) {
    return esc(value);
  }

  function isValidImageSrc(url) {
    const src = String(url || '').trim();
    return /^https?:\/\//i.test(src) || /^data:image\//i.test(src);
  }

  function normalizeFile(file) {
    return {
      id: String(file && file.id || ''),
      label: String(file && file.label || ''),
      designation: String(file && file.designation || ''),
      clearanceLevel: String(file && file.clearanceLevel || 'REQUIRED'),
      notes: String(file && file.notes || ''),
      pageSlug: String(file && file.pageSlug || ''),
      imageUrl: String(file && file.imageUrl || ''),
      imageAlt: String(file && file.imageAlt || ''),
      hoverCaption: String(file && file.hoverCaption || '')
    };
  }

  function normalizeChapter(chapter) {
    return {
      id: String(chapter && chapter.id || ''),
      title: String(chapter && chapter.title || 'Chapter'),
      branch: String(chapter && chapter.branch || ''),
      compartment: String(chapter && chapter.compartment || ''),
      rangeStart: String(chapter && chapter.rangeStart || ''),
      rangeEnd: String(chapter && chapter.rangeEnd || ''),
      files: Array.isArray(chapter && chapter.files) ? chapter.files.map(normalizeFile) : []
    };
  }

  function normalizeLegacyData(raw) {
    const base = { ...LEGACY_DEFAULT, ...(raw || {}) };
    return {
      title: String(base.title || LEGACY_DEFAULT.title),
      subtitle: String(base.subtitle || LEGACY_DEFAULT.subtitle),
      description: String(base.description || ''),
      foundation: String(base.foundation || ''),
      priorOwners: String(base.priorOwners || ''),
      currentOwner: String(base.currentOwner || ''),
      chapters: Array.isArray(base.chapters) ? base.chapters.map(normalizeChapter) : []
    };
  }

  function applyLegacyNarrativeDefaults(data) {
    const normalized = { ...(data || {}) };
    const oldFoundation = 'Origins and preservation directives are maintained here.';
    const oldPrior = 'Historical owner transitions are logged here.';
    const oldCurrent = 'Current continuity directives are logged here.';
    const previousFoundation = 'Prior to becoming a multinational private organization, the Red Oaker Guild was made up of a singular team of scientific researchers, doctors, and priests. Led by one man\'s vision, they strived to understand and even befriend the anomalous beings and objects they encountered, harboring and consistently observing many of them. Throughout decades, leadership shifted, and many personnel recorded their findings until the Guild\'s collapse near the late 20th century.';
    const previousPrior = 'During the collapse many anomalies escaped, and those too weak, succumbed to the harsh nature of the world. Many records were destroyed or lost. Under the first Archon, Mikolov "Ekat" Gunitsky, the Guild was rebuilt and found records were consolidated into a system known as the Anomalous Registry of the Red Oaker Guild or "ARROG". This served to centralize all information of the Guild and the anomalies into a single controlled system.';
    const previousCurrent = 'Today, the Guild still uses the ARROG system, with the hopes of one day restoring the archive to its former glory. The Guild has expanded, with 242 Facilities and 12 Complexes placed around the world. The current Archon, Archon Quincy, operates the Guild as both a psychiatric ward and an anomalous research center, allowing patients to be selected for testing with anomalies.\n\nThe Guild prioritizes the recovery of lost research and the expansion of the Registry through newly acquired anomalies. In accordance with its doctrine, all anomalies are sheltered, observed, and pursued for understanding.';

    if (!String(normalized.description || '').trim() || normalized.description === 'Legacy front page record for Guild archival continuity.') {
      normalized.description = LEGACY_DEFAULT.description;
    }
    if (!String(normalized.foundation || '').trim() || normalized.foundation === oldFoundation || normalized.foundation === previousFoundation) {
      normalized.foundation = LEGACY_DEFAULT.foundation;
    }
    if (!String(normalized.priorOwners || '').trim() || normalized.priorOwners === oldPrior || normalized.priorOwners === previousPrior) {
      normalized.priorOwners = LEGACY_DEFAULT.priorOwners;
    }
    if (!String(normalized.currentOwner || '').trim() || normalized.currentOwner === oldCurrent || normalized.currentOwner === previousCurrent) {
      normalized.currentOwner = LEGACY_DEFAULT.currentOwner;
    }

    return normalized;
  }

  function ensureLegacyAdditions(data) {
    const normalized = applyLegacyNarrativeDefaults(normalizeLegacyData(data));
    const defaultOttChapter = LEGACY_DEFAULT.chapters.find(ch => ch.id === 'hostile-orders');
    if (!defaultOttChapter) return normalized;

    let chapter = normalized.chapters.find(ch => ch.id === 'hostile-orders');
    if (!chapter) {
      normalized.chapters.push(normalizeChapter(defaultOttChapter));
      return normalized;
    }

    const defaultOttFile = (defaultOttChapter.files || []).find(file => file.id === 'ott_1');
    if (defaultOttFile && !chapter.files.some(file => file.id === 'ott_1')) {
      chapter.files.push(normalizeFile(defaultOttFile));
    }

    return normalized;
  }

    return {
      id: 'chapter_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      title: 'New Chapter',
      branch: '',
      compartment: '',
      rangeStart: '',
      rangeEnd: '',
      files: []
    };

  function createFileEntry() {
    return {
      id: 'file_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      label: '',
      designation: '',
      clearanceLevel: 'REQUIRED',
      notes: '',
      pageSlug: '',
      imageUrl: '',
      imageAlt: '',
      hoverCaption: ''
    };
  }

  function getChapterById(chapterId) {
    return legacyData.chapters.find(ch => ch.id === chapterId) || null;
  }

  function getFileById(chapterId, fileId) {
    const chapter = getChapterById(chapterId);
    if (!chapter) return null;
    return chapter.files.find(file => file.id === fileId) || null;
  }

  function addChapter() {
    legacyData.chapters.push(createChapter());
    renderLegacySheet();
    renderEditorChapters();

  function removeChapter(chapterId) {
    legacyData.chapters = legacyData.chapters.filter(ch => ch.id !== chapterId);

    renderEditorChapters();
  }

  function addFileToChapter(chapterId) {
    const chapter = getChapterById(chapterId);
    if (!chapter) return;
    chapter.files.push(createFileEntry());
    renderLegacySheet();
    renderEditorChapters();
  }

  function removeFileFromChapter(chapterId, fileId) {
    const chapter = getChapterById(chapterId);
    if (!chapter) return;
    chapter.files = chapter.files.filter(file => file.id !== fileId);
    renderLegacySheet();
    renderEditorChapters();
  }

  function updateChapterField(chapterId, field, value) {
    const chapter = getChapterById(chapterId);
    if (!chapter) return;
    chapter[field] = value;
    renderLegacySheet();
  }

  function updateFileField(chapterId, fileId, field, value) {
    const file = getFileById(chapterId, fileId);
    if (!file) return;
    file[field] = value;
    renderLegacySheet();
  }

  async function uploadFileImage(fileBlob, chapterId, fileId) {
    if (!ownerCanEdit || !authRef || !authRef.currentUser || !fileBlob) return;
    if (!legacyStorage) {
      alert('Storage service is unavailable. Reload and try again.');
      return;
    }
    if (!LEGACY_IMAGE_TYPES.has(fileBlob.type)) {
      alert('Only PNG, JPG, GIF, and WebP images are allowed.');
      return;
    }
    if (fileBlob.size > LEGACY_IMAGE_MAX_BYTES) {
      alert('Image must be 2 MB or smaller.');
      return;
    }

    const entry = getFileById(chapterId, fileId);
    if (!entry) return;

    const safeName = fileBlob.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = 'uploads/' + authRef.currentUser.uid + '/legacy_file_' + Date.now() + '_' + safeName;
    const statusEl = document.getElementById('legacy-status');
    statusEl.textContent = 'Uploading image...';

    try {
      const snapshot = await legacyStorage.ref(path).put(fileBlob, { contentType: fileBlob.type });
      const url = await snapshot.ref.getDownloadURL();
      entry.imageUrl = url;
      if (!entry.imageAlt) {
        entry.imageAlt = fileBlob.name.replace(/\.[^.]+$/, '');
      }
      renderLegacySheet();
      renderEditorChapters();
      statusEl.textContent = 'Image uploaded successfully.';
    } catch (err) {
      statusEl.textContent = 'Image upload failed.';
      alert('Could not upload image: ' + err.message);
    }
  }

  function workshopEditHref(slug) {
    const s = String(slug || '').trim();
    if (!s) return '';
    return 'submit.html?editSlug=' + encodeURIComponent(s);
  }

  function pageOpenHref(slug) {
    const s = String(slug || '').trim();
    if (!s) return '';
    return 'page.html?slug=' + encodeURIComponent(s);
  }

  function stripHtmlForLoreSummary(html) {
    return String(html || '')
      .replace(/<style[\s\S]*?<\/style>/gi, ' ')
      .replace(/<script[\s\S]*?<\/script>/gi, ' ')
      .replace(/<[^>]+>/g, ' ')
      .replace(/&nbsp;/gi, ' ')
      .replace(/&[a-z0-9#]+;/gi, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  let currentSearchQuery = '';
  let currentClearanceFilter = '';
  let currentSortBy = 'chapter';
  let filteredChapters = [];
  let selectedEntries = new Map(); // Map of fileId -> { chapterId, fileId }
  let loreIndexEntries = [];

  function toggleSelectAllEntries(checked) {
    selectedEntries.clear();
    if (checked && currentSearchQuery || currentClearanceFilter) {
      const chapters = getFilteredAndSortedChapters();
      chapters.forEach(ch => {
        ch.files.forEach(file => {
          selectedEntries.set(file.id, { chapterId: ch.id, fileId: file.id });
        });
      });
    } else if (checked) {
      legacyData.chapters.forEach(ch => {
        ch.files.forEach(file => {
          selectedEntries.set(file.id, { chapterId: ch.id, fileId: file.id });
        });
      });
    }
    updateBulkActionUI();
  }

  function bulkUpdateClearance() {
    if (!ownerCanEdit) {
      alert('Owner authorization required.');
      return;
    }
    if (selectedEntries.size === 0) {
      alert('Select entries first.');
      return;
    }
    const newLevel = prompt('Enter new clearance level (e.g., LEVEL 3, REQUIRED):');
    if (!newLevel) return;
    
    selectedEntries.forEach(({ chapterId, fileId }) => {
      const file = getFileById(chapterId, fileId);
      if (file) file.clearanceLevel = newLevel;
    });
    renderLegacySheet();
    renderEditorChapters();
    selectedEntries.clear();
    updateBulkActionUI();
    document.getElementById('legacy-select-all').checked = false;
  }

  function bulkDeleteEntries() {
    if (!ownerCanEdit) {
      alert('Owner authorization required.');
      return;
    }
    if (selectedEntries.size === 0) {
      alert('Select entries first.');
      return;
    }
    if (!confirm(`Delete ${selectedEntries.size} entry/entries? This cannot be undone.`)) return;
    
    selectedEntries.forEach(({ chapterId, fileId }) => {
      const chapter = getChapterById(chapterId);
      if (chapter) {
        chapter.files = chapter.files.filter(f => f.id !== fileId);
      }
    });
    renderLegacySheet();
    renderEditorChapters();
    selectedEntries.clear();
    updateBulkActionUI();
    document.getElementById('legacy-select-all').checked = false;
  }

  function updateBulkActionUI() {
    const bulkPanel = document.getElementById('legacy-bulk-actions');
    if (bulkPanel && ownerCanEdit) {
      bulkPanel.style.display = selectedEntries.size > 0 ? 'block' : 'none';
    }
  }

  function getFilteredAndSortedChapters() {
    let chapters = JSON.parse(JSON.stringify(legacyData.chapters));
    
    // Apply search filter
    if (currentSearchQuery.trim()) {
      const query = currentSearchQuery.toLowerCase();
      chapters = chapters.map(ch => ({
        ...ch,
        files: ch.files.filter(file =>
          file.designation.toLowerCase().includes(query) ||
          file.label.toLowerCase().includes(query) ||
          file.notes.toLowerCase().includes(query)
        )
      })).filter(ch => ch.files.length > 0);
    }
    
    // Apply clearance filter
    if (currentClearanceFilter) {
      chapters = chapters.map(ch => ({
        ...ch,
        files: ch.files.filter(file => file.clearanceLevel === currentClearanceFilter)
      })).filter(ch => ch.files.length > 0);
    }
    
    // Apply sorting (only applies when not showing all chapters in order)
    if (currentSearchQuery || currentClearanceFilter) {
      if (currentSortBy === 'designation') {
        chapters.forEach(ch => {
          ch.files.sort((a, b) => a.designation.localeCompare(b.designation));
        });
      } else if (currentSortBy === 'clearance') {
        const clearanceOrder = { 'REQUIRED': 0, 'LEVEL 1': 1, 'LEVEL 2': 2, 'LEVEL 3': 3, 'LEVEL 4': 4, 'LEVEL 5': 5, 'RESTRICTED': 6 };
        chapters.forEach(ch => {
          ch.files.sort((a, b) => (clearanceOrder[a.clearanceLevel] || 99) - (clearanceOrder[b.clearanceLevel] || 99));
        });
      } else if (currentSortBy === 'label') {
        chapters.forEach(ch => {
          ch.files.sort((a, b) => a.label.localeCompare(b.label));
        });
      }
    }
    
    return chapters;
  }

    legacyData.subtitle = document.getElementById('legacy-subtitle').value.trim() || LEGACY_DEFAULT.subtitle;
    legacyData.description = document.getElementById('legacy-description').value.trim();
    legacyData.foundation = document.getElementById('legacy-foundation').value.trim() || LEGACY_DEFAULT.foundation;
    legacyData.priorOwners = document.getElementById('legacy-prior').value.trim() || LEGACY_DEFAULT.priorOwners;
    legacyData.currentOwner = document.getElementById('legacy-current').value.trim() || LEGACY_DEFAULT.currentOwner;
  }

  function toggleLegacyEditor(open) {
    if (!ownerCanEdit) return;
    const panel = document.getElementById('legacy-editor');
    if (open) {
      setEditorValues();
      panel.classList.add('open');
    } else {
      panel.classList.remove('open');
    }
  }

  async function saveLegacySheet() {
    if (!ownerCanEdit || !auth || !auth.currentUser) return;
    
    const statusEl = document.getElementById('legacy-status');
    statusEl.textContent = 'Saving legacy sheet...';
    
    try {
      // Force token refresh to ensure latest claims
      await auth.currentUser.getIdToken(true);
      
      collectEditorValues();

      const payload = {
        ...ensureLegacyAdditions(legacyData),
        updatedBy: auth.currentUser.displayName || auth.currentUser.email || 'Owner',
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      await db.collection('legacySheets').doc(LEGACY_SHEET_ID).set(payload, { merge: true });
      legacyData = ensureLegacyAdditions(payload);
      renderLegacySheet();
      toggleLegacyEditor(false);
      statusEl.textContent = 'Legacy sheet updated.';
      alert('Legacy sheet saved successfully.');
      console.log('Legacy sheet saved by:', auth.currentUser.email);
    } catch (err) {
      console.error('Save error:', err);
      statusEl.textContent = 'Save failed: ' + err.code;
      if (err.code === 'permission-denied') {
        alert('Permission denied. Try signing out and signing back in.');
      } else {
        alert('Could not save legacy sheet: ' + err.message);
      }
    }
  }

  async function loadLegacySheet() {
    try {
      const doc = await db.collection('legacySheets').doc(LEGACY_SHEET_ID).get();
      if (doc.exists) {
        legacyData = ensureLegacyAdditions(doc.data() || {});
      } else {
        legacyData = ensureLegacyAdditions(LEGACY_DEFAULT);
      }
    } catch (_err) {
      legacyData = ensureLegacyAdditions(LEGACY_DEFAULT);
    }

    try {
      const loreSnap = await db.collection('loreIndex').get();
      loreIndexEntries = loreSnap.docs
        .map(doc => ({ id: doc.id, ...doc.data() }))
        .sort((a, b) => {
          const aTime = a.updatedAt?.seconds || a.publishedAt?.seconds || 0;
          const bTime = b.updatedAt?.seconds || b.publishedAt?.seconds || 0;
          return bTime - aTime;
        });
    } catch (_err) {
      loreIndexEntries = [];
    }

    renderLegacySheet();
  }

  // canEditLegacy is defined above using the new adminHasDelegation logic.
  // We use this local shim if we need to pass a user object explicitly.
  function _legacyUserCheck(user) {
    if (!user || !user.email) return false;
    return canEditLegacy(user.email);
  }

  async function hydrateLegacyForUser(user) {
    await loadLegacySheet();

    const navAuth = document.getElementById('nav-auth');
    if (user) {
      const display = user.displayName || 'Agent';
      if (typeof renderUserMenuHTML === 'function') {
        navAuth.innerHTML = renderUserMenuHTML(display);
      } else {
        navAuth.innerHTML = '<button class="nav-btn" onclick="auth.signOut()">Sign Out</button>';
      }

      // Wait for role resolution before checking ownership
      try { 
        if (typeof rolesReady !== 'undefined') await rolesReady; 
      } catch (_err) { 
        console.warn('Could not wait for rolesReady:', _err);
      }
      
      ownerCanEdit = _legacyUserCheck(user);
      console.log('Legacy Sheet Auth Check:', { 
        userEmail: user.email, 
        ownerCanEdit, 
        isOwnerFunction: typeof isOwner === 'function' ? 'available' : 'not available',
        timestamp: new Date().toISOString()
      });
    } else {
      ownerCanEdit = false;
      navAuth.innerHTML = '<button class="nav-btn" onclick="location.href=\'index.html\'">Sign In</button>';
    }

    const ownerActions = document.getElementById('legacy-owner-actions');
    ownerActions.style.display = ownerCanEdit ? 'flex' : 'none';
    document.getElementById('legacy-status').textContent = ownerCanEdit
      ? 'Owner verified. Edit mode available.'
      : 'Observer mode. Owner sign-in required for edits.';
  }

  if (auth && typeof auth.onAuthStateChanged === 'function') {
    auth.onAuthStateChanged(hydrateLegacyForUser);
  } else {
    hydrateLegacyForUser(null);
  }
</script>
</body>
</html>
